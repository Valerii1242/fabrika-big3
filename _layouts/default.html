<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} · Валерий Корешков · FABRIKA BIG3</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #060606;
      --panel: #0c0c0c;
      --gold: #c9ab67;
      --gold-soft: #9c8350;
      --text: #f4f1ea;
      --muted: #aaa39a;
      --line: rgba(201,171,103,.16);
      --shadow: 0 16px 50px rgba(0,0,0,.35);
      --radius: 18px;
      --max: 860px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 17px;
      line-height: 1.68;
      font-weight: 400;
    }
    a { color: var(--gold); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* NAV */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(6,6,6,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }
    .wrap { width: min(100% - 40px, var(--max)); margin: 0 auto; }
    .nav { display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .brand {
      font-size: 15px; letter-spacing: .38em;
      color: var(--gold); font-weight: 700; text-decoration: none;
    }
    .nav-right { display: flex; align-items: center; gap: 24px; }
    .cta {
      display: inline-block;
      background: var(--gold); color: #111;
      font-weight: 700; font-size: 12px;
      letter-spacing: .14em; text-transform: uppercase;
      padding: 10px 20px; border-radius: 6px;
      text-decoration: none; transition: opacity .18s;
      white-space: nowrap;
    }
    .cta:hover { opacity: .85; text-decoration: none; }

    /* ARTICLE */
    .article-wrap {
      width: min(100% - 40px, var(--max));
      margin: 60px auto 100px;
    }
    .article-meta {
      font-size: 13px; color: var(--muted);
      letter-spacing: .12em; text-transform: uppercase;
      margin-bottom: 32px;
    }
    .article-meta span { color: var(--gold); margin-right: 12px; }
    h1 {
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 800; line-height: 1.12;
      letter-spacing: -.02em;
      margin: 0 0 32px;
      color: var(--text);
    }
    h2 {
      font-size: clamp(20px, 3vw, 26px);
      font-weight: 700; line-height: 1.22;
      letter-spacing: -.02em;
      margin: 56px 0 20px;
      color: var(--text);
    }
    p { margin: 0 0 24px; color: var(--text); }
    em { color: var(--muted); font-style: italic; }
    strong { color: var(--text); font-weight: 700; }
    hr {
      border: none;
      border-top: 1px solid var(--line);
      margin: 48px 0;
    }
    .article-visual {
      margin: 40px 0 48px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--line);
    }
    .article-visual img {
      width: 100%; display: block;
    }
    .article-visual figcaption {
      padding: 14px 20px;
      font-size: 13px; color: var(--muted);
      background: var(--panel);
      border-top: 1px solid var(--line);
      line-height: 1.5;
    }
    .article-footer {
      margin-top: 64px;
      padding-top: 32px;
      border-top: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }
    .article-footer a.back {
      font-size: 13px; letter-spacing: .12em;
      text-transform: uppercase; color: var(--muted);
      text-decoration: none; transition: color .18s;
    }
    .article-footer a.back:hover { color: var(--text); }
    .article-footer a.cta-link {
      background: var(--gold); color: #111;
      font-weight: 700; font-size: 12px;
      letter-spacing: .14em; text-transform: uppercase;
      padding: 12px 24px; border-radius: 6px;
      text-decoration: none; transition: opacity .18s;
    }
    .article-footer a.cta-link:hover { opacity: .85; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--line);
      padding: 28px 0;
    }
    .footer-row {
      display: flex; align-items: center;
      justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
      font-size: 13px; color: var(--muted);
    }
    .footer-links { display: flex; gap: 18px; flex-wrap: wrap; }
    .footer-links a { color: var(--muted); font-size: 13px; text-decoration: none; transition: color .18s; }
    .footer-links a:hover { color: var(--text); }

    @media (max-width: 600px) {
      .article-wrap { margin-top: 40px; }
      h1 { font-size: 26px; }
      h2 { font-size: 20px; margin-top: 40px; }
      .article-footer { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="wrap nav">
      <a href="/" class="brand">FABRIKA BIG3</a>
      <div class="nav-right">
        <a href="/#expertise" style="font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;transition:color .18s;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">Экспертиза</a>
        <a href="/#cases" style="font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;transition:color .18s;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">Кейсы</a>
        <a class="cta" href="https://t.me/Livesport2" target="_blank" rel="noopener noreferrer">Записаться</a>
      </div>
    </div>
  </header>

  {{ content }}

  <footer>
    <div class="wrap footer-row">
      <div>© 2026 Валерий Корешков · FABRIKA BIG3</div>
      <div class="footer-links">
        <a href="/">Главная</a>
        <a href="/#cases">Кейсы</a>
        <a href="/#products">Продукты</a>
        <a href="/#zg">ZG 2.0</a>
        <a href="https://t.me/fabrika_big3" target="_blank" rel="noopener noreferrer">@fabrika_big3</a>
      </div>
    </div>
  </footer>

</body>
</html>
