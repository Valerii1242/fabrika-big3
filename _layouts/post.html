---
layout: default
---

<main class="article-wrap">

  <div class="article-meta">
    <span>{{ page.categories | join: " · " }}</span>
    {{ page.date | date: "%d.%m.%Y" }}
  </div>

  <h1 data-ru="{{ page.title }}" data-en="{{ page.title_en | default: page.title }}">{{ page.title }}</h1>

  {%- if page.image -%}
  <img src="{{ page.image }}" alt="{{ page.title }}" loading="lazy" />
  {%- endif -%}

  {{ content }}

  <div class="article-footer">
    <a class="back" href="/blog/">← <span data-ru="Все материалы" data-en="All articles">Все материалы</span></a>
    <a class="cta-link" href="https://t.me/Livesport2" target="_blank" rel="noopener noreferrer">
      <span data-ru="Обсудить задачу →" data-en="Discuss a project →">Обсудить задачу →</span>
    </a>
  </div>

</main>
